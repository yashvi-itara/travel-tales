<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Travel Tales - A Minimalist Journey{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            cream: '#f8f1e9',
                            teal: '#0f766e',
                            dark: '#1f2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Vibes Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8f1e9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Masonry Grid Setup */
        .masonry {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        @media (min-width: 1280px) { .masonry { column-count: 4; } }
        
        .htmx-indicator{ opacity:0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator{ opacity:1; }
        .htmx-request.htmx-indicator{ opacity:1; }
    </style>
</head>
<body class="bg-brand-cream text-brand-dark font-sans antialiased min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2 group">
                        <svg class="w-8 h-8 text-brand-teal transform group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="font-playfair font-bold text-2xl text-brand-dark tracking-tight">Travel Tales</span>
                    </a>
                </div>
                <!-- Links -->
                <div class="flex items-center space-x-6">
                    <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}border-brand-teal text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                        Home
                    </a>
                    <a href="{{ url_for('main.explore') }}" class="{% if request.endpoint == 'main.explore' %}border-brand-teal text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                        Explore
                    </a>
                    <a href="{{ url_for('main.recommendations') }}" class="{% if request.endpoint == 'main.recommendations' %}border-brand-teal text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                        Top Picks <span class="ml-1.5 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-brand-teal/10 text-brand-teal">NEW</span>
                    </a>
                    <a href="{{ url_for('meetups.index') }}" class="{% if request.blueprint == 'meetups' %}border-brand-teal text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                        Connect 🌍
                    </a>
                    
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('profiles.public_profile', username=current_user.username) }}" class="text-gray-600 hover:text-brand-teal font-medium transition-colors">My Profile</a>
                        <a href="{{ url_for('main.create_tale') }}" class="bg-brand-teal hover:bg-teal-800 text-white px-5 py-2 rounded-full font-medium transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                            Create Tale
                        </a>
                        <!-- Logout logic/icon can go here or under profile dropdown -->
                        <a href="{{ url_for('main.logout') }}" class="text-sm text-gray-500 hover:text-red-500 transition-colors ml-4">Logout</a>
                    {% else %}
                        <a href="{{ url_for('main.login') }}" class="text-gray-600 hover:text-brand-teal font-medium transition-colors">Log in</a>
                        <a href="{{ url_for('main.register') }}" class="bg-brand-teal hover:bg-teal-800 text-white px-5 py-2 rounded-full font-medium transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                            Sign up
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12 py-10 text-center">
        <p class="font-playfair text-xl text-gray-800 font-semibold mb-2">Travel Tales</p>
        <p class="text-sm text-gray-500 font-inter">&copy; 2026 Crafted with ❤️ for Wanderers.</p>
    </footer>
    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Listen for the custom HTMX event triggered from the server
        document.body.addEventListener('show-toast', function(evt) {
            const data = evt.detail;
            const toast = document.createElement('div');
            toast.className = 'pointer-events-auto bg-white border border-brand-teal/20 shadow-xl rounded-2xl px-6 py-4 flex items-center justify-between gap-4 transform translate-x-full transition-all duration-500 ease-out';
            
            toast.innerHTML = `
                <div class="flex flex-col">
                    <p class="text-sm font-semibold text-gray-800">${data.message}</p>
                    ${data.link ? `<a href="${data.link}" class="text-xs text-brand-teal font-bold hover:underline mt-1">Visit Profile →</a>` : ''}
                </div>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            
            const container = document.getElementById('toast-container');
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.remove('translate-x-full');
            }, 10);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        });

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) menu.classList.toggle('hidden');
        }
    </script>
</body>
</html>
