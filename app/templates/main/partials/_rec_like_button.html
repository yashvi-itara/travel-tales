<!-- Like/Heart Partial for Recommendations -->
<button class="flex items-center gap-1 focus:outline-none transform transition-all duration-300 group"
        {% if current_user.is_authenticated %}
        hx-post="{{ url_for('main.like_recommendation', rec_id=rec.id) }}"
        hx-swap="outerHTML"
        {% else %}
        onclick="window.location.href='{{ url_for('main.login') }}';"
        {% endif %}
        >
    
    <div class="p-1.5 rounded-full group-hover:bg-red-50 transition-colors flex items-center gap-1.5">
        {% if is_liked %}
        <!-- Filled Heart -->
        <svg class="w-5 h-5 text-red-500 fill-current drop-shadow-sm " viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path>
        </svg>
        {% else %}
        <!-- Empty Heart -->
        <svg class="w-5 h-5 text-gray-400 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
        </svg>
        {% endif %}

        <span class="text-xs font-medium text-gray-500 {{ 'text-red-500' if is_liked else '' }}">
            {{ rec.likes.count() }}
        </span>
    </div>
</button>
