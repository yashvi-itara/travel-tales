<!-- Save/Bookmark Partial for Recommendations -->
<button class="relative focus:outline-none transform transition-all duration-300 group"
        {% if current_user.is_authenticated %}
        hx-post="{{ url_for('main.save_recommendation', rec_id=rec.id) }}"
        hx-swap="outerHTML"
        {% else %}
        onclick="window.location.href='{{ url_for('main.login') }}';"
        {% endif %}
        >
    
    <div class="p-1.5 flex items-center gap-1.5">
        {% if is_saved %}
        <!-- Filled Bookmark -->
        <svg class="w-5 h-5 text-brand-teal fill-current drop-shadow-sm " viewBox="0 0 20 20">
            <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path>
        </svg>
        {% else %}
        <!-- Empty Bookmark -->
        <svg class="w-5 h-5 text-gray-400 group-hover:text-brand-teal transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
        </svg>
        {% endif %}

        <span class="text-xs font-medium text-gray-500 {{ 'text-brand-teal' if is_saved else '' }}">
            {{ rec.saved_by.count() }}
        </span>
    </div>
</button>
