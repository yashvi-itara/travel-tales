<!-- Tale Modal Partial for HTMX -->
<div id="tale-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4 animate-fade-in" onclick="this.remove()">
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all" onclick="event.stopPropagation();">
        <div class="relative h-48 bg-gray-200">
            {% if tale.image_file %}
            <img src="{{ url_for('static', filename='uploads/' + tale.image_file) }}" class="w-full h-full object-cover">
            {% else %}
            <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=500&q=80" class="w-full h-full object-cover">
            {% endif %}
            
            <button onclick="document.getElementById('tale-modal').remove()" class="absolute top-3 right-3 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full p-2 transition-colors text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="p-6 text-center">
            <span class="inline-block bg-brand-cream text-brand-teal text-xs px-3 py-1 rounded-full font-semibold border border-brand-teal/20 mb-3">{{ tale.destination }}</span>
            <h2 class="font-playfair text-2xl font-bold text-gray-900 mb-2">{{ tale.title }}</h2>
            <p class="text-sm text-gray-500 mb-6 line-clamp-2">{{ tale.content[:100] }}...</p>
            
            <a href="{{ url_for('main.view_tale', slug=tale.slug) }}" class="inline-block w-full bg-brand-teal hover:bg-teal-800 text-white font-medium py-3 rounded-full transition-colors shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                View Full Tale
            </a>
        </div>
    </div>
</div>
