<form class="space-y-6" action="{{ url_for('main.login') }}" method="POST" hx-post="{{ url_for('main.login') }}" hx-swap="outerHTML" hx-indicator="#login-spinner">
    
    {% if error %}
    <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100 flex items-center gap-2 slide-up">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        {{ error }}
    </div>
    {% endif %}

    <div>
        <label for="email" class="block text-sm font-medium text-gray-700 font-inter">Email address</label>
        <div class="mt-1">
            <input id="email" name="email" type="email" autocomplete="email" required value="{{ email or '' }}"
                class="appearance-none block w-full px-3 py-2.5 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-teal focus:border-transparent sm:text-sm transition-all bg-gray-50/50 hover:bg-white focus:bg-white">
        </div>
    </div>

    <div>
        <label for="password" class="block text-sm font-medium text-gray-700 font-inter">Password</label>
        <div class="mt-1 relative">
            <input id="password" name="password" type="password" autocomplete="current-password" required
                class="appearance-none block w-full px-3 py-2.5 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-teal focus:border-transparent sm:text-sm transition-all bg-gray-50/50 hover:bg-white focus:bg-white">
        </div>
    </div>

    <div class="flex items-center justify-between">
        <div class="flex items-center">
            <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-brand-teal focus:ring-brand-teal border-gray-300 rounded cursor-pointer">
            <label for="remember_me" class="ml-2 block text-sm text-gray-700 cursor-pointer">Remember me</label>
        </div>

        <div class="text-sm">
            <a href="#" class="font-medium text-brand-teal hover:text-teal-800 transition-colors">Forgot password?</a>
        </div>
    </div>

    <div>
        <button type="submit"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-full shadow-md text-sm font-medium text-white bg-brand-teal hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-teal transition-all transform hover:-translate-y-0.5 relative">
            <span class="flex items-center gap-2">
                <span>Sign in</span>
                <!-- Loading Spinner for HTMX -->
                <svg id="login-spinner" class="animate-spin h-4 w-4 text-white htmx-indicator absolute right-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </span>
        </button>
    </div>
</form>
