{% extends "base.html" %}

{% block title %}Log In - Travel Tales{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <svg class="w-12 h-12 text-brand-teal mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="font-playfair text-4xl font-bold text-gray-900 tracking-tight">Welcome back.</h2>
        <p class="mt-2 text-sm text-gray-600 font-inter">
            Your journey awaits. Don't have an account? 
            <a href="{{ url_for('main.register') }}" class="font-medium text-brand-teal hover:text-teal-800 transition-colors">Start a new tale</a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl shadow-brand-teal/5 sm:rounded-2xl sm:px-10 border border-gray-100">
            {% include "main/partials/_login_form.html" %}
        </div>
    </div>
</div>
{% endblock %}
