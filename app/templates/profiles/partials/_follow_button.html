<!-- Follow / Unfollow Button Partial -->
{% if not current_user.is_authenticated %}
<a href="{{ url_for('main.login') }}"
   class="inline-flex items-center gap-2 bg-brand-teal text-white font-semibold px-6 py-2.5 rounded-full shadow-md hover:bg-teal-800 transition-all transform hover:-translate-y-0.5">
    Follow
</a>
{% elif current_user.id == profile_user.id %}
<a href="{{ url_for('main.profile') }}"
   class="inline-flex items-center gap-2 bg-gray-100 text-gray-700 font-semibold px-6 py-2.5 rounded-full hover:bg-gray-200 transition-all">
    ✏️ Edit Profile
</a>
{% elif is_following %}
<button hx-post="{{ url_for('profiles.toggle_follow', username=profile_user.username) }}"
        hx-swap="outerHTML"
        class="inline-flex items-center gap-2 bg-brand-teal/10 text-brand-teal border-2 border-brand-teal font-semibold px-6 py-2.5 rounded-full hover:bg-red-50 hover:text-red-500 hover:border-red-400 transition-all group">
    <svg class="w-4 h-4 group-hover:hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
    <span class="group-hover:hidden">Following</span>
    <span class="hidden group-hover:inline text-red-500">Unfollow</span>
</button>
{% else %}
<button hx-post="{{ url_for('profiles.toggle_follow', username=profile_user.username) }}"
        hx-swap="outerHTML"
        class="inline-flex items-center gap-2 bg-brand-teal text-white font-semibold px-6 py-2.5 rounded-full shadow-md hover:bg-teal-800 transition-all transform hover:-translate-y-0.5">
    + Follow
</button>
{% endif %}
