{% extends "base.html" %}
{% block title %}Post a Meetup - Travel Tales{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 sm:p-12">
        <div class="mb-8 text-center">
            <div class="text-5xl mb-4">🌍</div>
            <h1 class="font-playfair text-4xl font-bold text-gray-900 mb-2">Start a Meetup</h1>
            <p class="text-gray-500 font-inter">Tell wanderers where you're headed and find your crew.</p>
        </div>

        <form method="post" action="{{ url_for('meetups.create_meetup') }}" class="space-y-6">
            <!-- Title -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Meetup Title *</label>
                <input type="text" name="title" maxlength="140" required placeholder="e.g. Sunrise Hike in the Atlas Mountains 🏔️"
                       class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-900 bg-gray-50">
            </div>

            <!-- Destination -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Destination *</label>
                <input type="text" name="destination" required placeholder="e.g. Bali, Indonesia"
                       class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-900 bg-gray-50">
            </div>

            <!-- Dates -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Start Date</label>
                    <input type="date" name="start_date"
                           class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-700 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">End Date</label>
                    <input type="date" name="end_date"
                           class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-700 bg-gray-50">
                </div>
            </div>

            <!-- Category -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                <select name="category" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-700 bg-gray-50">
                    <option value="Hiking">🥾 Hiking</option>
                    <option value="Food Tour">🍜 Food Tour</option>
                    <option value="Cultural">🏛️ Cultural</option>
                    <option value="Adventure">⚡ Adventure</option>
                    <option value="Photography">📸 Photography</option>
                    <option value="Beach">🏖️ Beach</option>
                    <option value="Solo">🧳 Solo Travelers</option>
                </select>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Description *</label>
                <textarea name="description" required rows="5" maxlength="1000"
                          placeholder="Tell travelers what you're planning, what to expect, group size, budget range, etc..."
                          class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-900 bg-gray-50 resize-none"></textarea>
            </div>

            <!-- Optional Photo URL -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Cover Photo URL <span class="font-normal text-gray-400">(optional)</span></label>
                <input type="url" name="photo_url" placeholder="https://..."
                       class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-teal font-inter text-gray-500 bg-gray-50">
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full bg-brand-teal text-white font-bold py-4 rounded-2xl shadow-md hover:bg-teal-800 transition-all transform hover:-translate-y-0.5 text-lg mt-2">
                Post My Meetup 🚀
            </button>
        </form>
    </div>
</div>
{% endblock %}
