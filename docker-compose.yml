version: "3.8"

services:
  # --------------------------------------------------------------------------
  # Production Service
  # Runs the final image with Gunicorn
  # --------------------------------------------------------------------------
  web:
    build:
      context: .
      target: final
    image: travel-tales:prod
    container_name: travel-tales-prod
    ports:
      - "80:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-default-key}
      - DATABASE_URL=sqlite:////app/data/travel_tales.db
    volumes:
      # Persist SQLite Database in /app/data container dir
      - travel_tales_db:/app/data
      # Persist Uploaded Images
      - travel_tales_uploads:/app/app/static/uploads
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: [ "prod" ]

  # --------------------------------------------------------------------------
  # Development Service
  # Mounts source code and runs Flask dev server with hot-reload
  # --------------------------------------------------------------------------
  dev:
    build:
      context: .
      target: final
    image: travel-tales:dev
    container_name: travel-tales-dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - FLASK_RUN_HOST=0.0.0.0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      # Point to current dir mapped db (in container, we map current dir to /app)
      - DATABASE_URL=sqlite:////app/travel_tales.db
    volumes:
      # Mount current host directory straight into /app for hot-reload
      - .:/app
    # Listen on all interfaces so friends on your WiFi can connect
    command: [ "flask", "run", "--host=0.0.0.0", "--port=5000" ]
    profiles: [ "dev" ]

volumes:
  travel_tales_db:
  travel_tales_uploads:
